<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>元和国学文化</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-mark">和</span>
      <span id="brandName">元和国学文化</span>
    </a>
    <nav class="nav">
      <a href="#services">业务</a>
      <a href="#news">动态</a>
      <a href="#articles">文章</a>
      <a href="gold.html">黄金页面</a>
      <a href="admin.html">内容编辑</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-media" id="heroMedia" aria-hidden="true">
        <div class="ink-scene">
          <div class="sun"></div>
          <div class="mountain mountain-a"></div>
          <div class="mountain mountain-b"></div>
          <div class="water-lines"></div>
        </div>
      </div>
      <div class="hero-copy">
        <p class="eyebrow" id="siteSubtitle">以经典为根，以当代生活为用</p>
        <h1 id="siteTitle">元和国学文化</h1>
        <p class="lead" id="siteDescription">面向家庭、学校与企业，提供国学文化课程、雅集活动、文化顾问与内容传播服务。</p>
        <div class="hero-actions">
          <a class="primary-action" id="ctaLink" href="#news">查看最新活动</a>
          <a class="ghost-action" href="gold.html">查看原黄金页面</a>
        </div>
      </div>
      <aside class="quote-panel">
        <span>经典摘句</span>
        <blockquote id="heroQuote">观乎人文，以化成天下。</blockquote>
        <p id="quoteSource">周易</p>
      </aside>
    </section>

    <section class="announcement" aria-label="公告">
      <div>
        <span>公告</span>
        <h2 id="announcementTitle">春季国学雅集开放预约</h2>
      </div>
      <p id="announcementBody">围绕礼乐、诗书、茶席与家风教育，提供小班制体验与定制活动。</p>
    </section>

    <section class="section" id="services">
      <div class="section-head">
        <span>Services</span>
        <h2>业务内容</h2>
      </div>
      <div class="service-grid" id="servicesGrid"></div>
    </section>

    <section class="split-section" id="news">
      <div class="section-head">
        <span>Updates</span>
        <h2>新闻与推送</h2>
      </div>
      <div class="news-list" id="newsList"></div>
    </section>

    <section class="section" id="articles">
      <div class="section-head">
        <span>Reading</span>
        <h2>精选文章</h2>
      </div>
      <div class="article-grid" id="articleGrid"></div>
    </section>
  </main>

  <footer class="footer">
    <p>元和国学文化内容站原型 · GitHub Pages 静态 HTTPS 版本</p>
    <a href="admin.html">编辑内容</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
