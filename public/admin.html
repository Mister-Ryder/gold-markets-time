<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内容后台 · 元和国学文化</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="admin-body">
  <header class="admin-header">
    <div>
      <p class="eyebrow">Content Studio</p>
      <h1>国学文化内容后台</h1>
    </div>
    <div class="admin-actions">
      <a class="ghost-action" href="/">查看前台</a>
      <button class="primary-action button-action" id="saveBtn">保存内容</button>
    </div>
  </header>

  <main class="admin-shell">
    <section class="editor-panel">
      <h2>网站简介</h2>
      <label>网站名称<input id="siteTitle" type="text"></label>
      <label>副标题<input id="siteSubtitle" type="text"></label>
      <label>简介<textarea id="siteDescription" rows="4"></textarea></label>
      <div class="two-cols">
        <label>按钮文字<input id="ctaLabel" type="text"></label>
        <label>按钮链接<input id="ctaHref" type="text"></label>
      </div>
    </section>

    <section class="editor-panel">
      <h2>主视觉与公告</h2>
      <label>主视觉图
        <input id="heroImageFile" type="file" accept="image/*">
      </label>
      <label>主视觉图地址或 Base64<textarea id="heroImage" rows="3"></textarea></label>
      <div class="preview-box" id="imagePreview"></div>
      <div class="two-cols">
        <label>摘句<input id="heroQuote" type="text"></label>
        <label>出处<input id="quoteSource" type="text"></label>
      </div>
      <label>公告标题<input id="announcementTitle" type="text"></label>
      <label>公告内容<textarea id="announcementBody" rows="3"></textarea></label>
    </section>

    <section class="editor-panel wide">
      <h2>业务、新闻、文章</h2>
      <p class="field-hint">每行一条。业务：标题 | 描述。新闻：标题 | 分类 | 日期 | 摘要。文章：标题 | 分类 | 摘要。</p>
      <label>业务内容<textarea id="servicesInput" rows="7"></textarea></label>
      <label>新闻与推送<textarea id="newsInput" rows="7"></textarea></label>
      <label>精选文章<textarea id="articlesInput" rows="7"></textarea></label>
      <p class="save-status" id="saveStatus">等待编辑</p>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
